<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Repozytoria jbackk-lang</title>
<style>
body { font-family: Arial; background: #111; color: #eee; padding: 20px; }
a { color: #4ea3ff; text-decoration: none; }
.repo { margin-bottom: 15px; padding: 10px; background: #1a1a1a; border-radius: 6px; }
</style>
</head>
<body>

<h1>Wszystkie repozytoria</h1>
<div id="repos">Ładowanie…</div>

<script>
fetch("https://api.github.com/users/jbackk-lang/repos?per_page=200")
  .then(r => r.json())
  .then(data => {
    let html = "";
    data.forEach(repo => {
      html += `
        <div class="repo">
          <a href="${repo.html_url}" target="_blank"><b>${repo.name}</b></a><br>
          ${repo.description || "Brak opisu"}<br>
          ⭐ ${repo.stargazers_count} | 🍴 ${repo.forks_count}
        </div>
      `;
    });
    document.getElementById("repos").innerHTML = html;
  });
</script>

</body>
</html>
